<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PXV — Market Detail Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f3f8;color:#1a1a2e}
header{background:#0d1b3e;color:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:15px;font-weight:600}
.logo{font-size:18px;font-weight:700;color:#4fc3f7}

/* Rankings table */
.main{padding:20px 24px}
.card{background:white;border-radius:10px;padding:16px 20px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:16px}
.profile-btns{display:flex;gap:6px;margin-bottom:14px}
.pb{padding:7px 16px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;border:1.5px solid #e2e8f0;background:white;color:#4a5568}
.pb.active{color:white}
.pb.d.active{background:#2b6cb0;border-color:#2b6cb0}
.pb.g.active{background:#276749;border-color:#276749}
.pb.r.active{background:#744210;border-color:#744210}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;border-bottom:2px solid #e2e8f0;color:#718096;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
td{padding:8px 10px;border-bottom:1px solid #f0f4f8;cursor:pointer}
tr.data-row:hover td{background:#ebf8ff}
tr.top5 td{background:#fefce8}
tr.selected td{background:#dbeafe!important}
.rank{font-weight:700;color:#4a5568;width:36px}
.score-bar{display:flex;align-items:center;gap:5px}
.bar{height:5px;border-radius:3px;background:#4fc3f7}
.tier{padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700}
.t1{background:#fff3cd;color:#856404}
.t2{background:#d1ecf1;color:#0c5460}
.t3{background:#f8d7da;color:#721c24}
.click-hint{font-size:10px;color:#a0aec0;font-style:italic;margin-bottom:8px}

/* Detail panel */
.detail-panel{position:fixed;right:0;top:0;width:480px;height:100vh;background:white;box-shadow:-4px 0 20px rgba(0,0,0,0.12);z-index:100;display:none;flex-direction:column;overflow:hidden}
.detail-panel.open{display:flex}
.dp-header{background:#0d1b3e;color:white;padding:16px 20px;flex-shrink:0}
.dp-header .msa-name{font-size:18px;font-weight:700;color:#4fc3f7}
.dp-header .meta{font-size:11px;color:#90a4ae;margin-top:4px}
.dp-close{position:absolute;top:14px;right:16px;background:none;border:none;color:white;font-size:20px;cursor:pointer;opacity:0.7}
.dp-close:hover{opacity:1}
.dp-scores{display:flex;gap:8px;padding:12px 16px;background:#f7fafc;flex-shrink:0}
.dp-score-box{flex:1;text-align:center;background:white;border-radius:8px;padding:8px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.dp-score-box .profile-name{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:#718096}
.dp-score-box .score-val{font-size:20px;font-weight:700;margin-top:2px}
.dp-score-box .rank-val{font-size:10px;color:#a0aec0;margin-top:1px}
.dp-body{flex:1;overflow-y:auto;padding:14px 16px}
.dp-section-title{font-size:10px;font-weight:700;color:#a0aec0;text-transform:uppercase;letter-spacing:0.6px;padding:10px 0 6px;border-top:1px solid #f0f4f8;margin-top:6px}
.dp-section-title:first-child{border-top:none;margin-top:0;padding-top:0}
.ind-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.ind-name{font-size:11px;color:#4a5568;flex:1;min-width:0}
.ind-name.inv{color:#718096}
.ind-bar-wrap{width:120px;flex-shrink:0}
.ind-bar-bg{height:6px;background:#f0f4f8;border-radius:3px;overflow:hidden}
.ind-bar-fill{height:6px;border-radius:3px;transition:width 0.4s}
.ind-score{font-size:11px;font-weight:700;min-width:34px;text-align:right}
.ind-raw{font-size:9px;color:#a0aec0;min-width:65px;text-align:right}
.dp-extra{background:#f7fafc;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:11px;color:#4a5568;line-height:1.6}
.dp-extra strong{color:#1a1a2e}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.2);z-index:99;display:none}
.overlay.open{display:block}
</style>
</head>
<body>

<header>
  <h1>PXV Multifamily — Market Rankings (Click any market for detail)</h1>
  <div class="logo">PXV</div>
</header>

<div class="main">
  <div class="card">
    <div class="profile-btns">
      <button class="pb d active" onclick="setProfile('Defensive',this)">🏛 Defensive (Core)</button>
      <button class="pb g" onclick="setProfile('Growth',this)">📈 Growth (Core+)</button>
      <button class="pb r" onclick="setProfile('Recovery',this)">🔄 Recovery (Value-Add)</button>
    </div>
    <div class="click-hint">👆 Click any market row to see detailed indicator breakdown</div>
    <table>
      <thead><tr>
        <th>Rank</th><th>MSA</th><th>Final Score</th><th>Base</th><th>Adj</th><th>Tier</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>

<div class="detail-panel" id="detailPanel">
  <button class="dp-close" onclick="closeDetail()">✕</button>
  <div class="dp-header">
    <div class="msa-name" id="dpMsaName"></div>
    <div class="meta" id="dpMeta"></div>
  </div>
  <div class="dp-scores" id="dpScores"></div>
  <div class="dp-body" id="dpBody"></div>
</div>

const MSAS = ["Southeast Florida","Orlando","Tampa","Jacksonville","Atlanta","Nashville","Charlotte","Raleigh","Northern Virginia","Suburban Maryland","Boston","Houston","Austin","Dallas","San Antonio","Phoenix","Las Vegas","Denver","Chicago","Indianapolis","Columbus","Kansas City","Charleston","Stamford"];

const CAT_ORDER = ['Demand Fundamentals','Market Performance','Supply Risk','Balance & Affordability'];
const PROFILE_COLORS = {Defensive:'#2b6cb0', Growth:'#276749', Recovery:'#744210'};

let currentProfile = 'Defensive';
let selectedMsa = null;

function setProfile(p, btn) {
  currentProfile = p;
  document.querySelectorAll('.pb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildTable();
  if (selectedMsa) showDetail(selectedMsa);
}

function buildTable() {
  const sorted = [...MSAS].sort((a,b) => 
    MSA_DATA[b].profiles[currentProfile].final - MSA_DATA[a].profiles[currentProfile].final
  );
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = sorted.map((msa, i) => {
    const d = MSA_DATA[msa].profiles[currentProfile];
    const rank = i+1;
    const tier = rank<=5?'Tier 1':rank<=18?'Tier 2':'Tier 3';
    const tierCls = rank<=5?'t1':rank<=18?'t2':'t3';
    const barW = Math.max(0,Math.min(80, Math.round(d.final*0.8)));
    const adj = d.pen + d.inv;
    const adjStr = adj>=0?`+${adj.toFixed(1)}`:adj.toFixed(1);
    const isSelected = msa === selectedMsa;
    return `<tr class="data-row${rank<=5?' top5':''}${isSelected?' selected':''}" onclick="showDetail('${msa}')">
      <td class="rank">${rank}</td>
      <td><strong>${rank<=5?msa:''}</strong>${rank>5?msa:''}</td>
      <td><div class="score-bar"><div class="bar" style="width:${barW}px"></div><strong>${d.final.toFixed(1)}</strong></div></td>
      <td style="color:#718096">${d.base.toFixed(1)}</td>
      <td style="color:${adj>=0?'#276749':'#c53030'}">${adjStr}</td>
      <td><span class="tier ${tierCls}">${tier}</span></td>
    </tr>`;
  }).join('');
}

function getBarColor(score) {
  if (score >= 75) return '#1b6b35';
  if (score >= 60) return '#4caf50';
  if (score >= 50) return '#4fc3f7';
  if (score >= 35) return '#f5a623';
  return '#e53e3e';
}

function formatRaw(v, name) {
  if (v === null || v === undefined) return 'N/A';
  if (name.includes('Growth') || name.includes('Migration') || name.includes('Forecast') || name.includes('Pipeline') || name.includes('Deliveries') || name.includes('Supply') || name.includes('Absorption') || name.includes('Rent-to') || name.includes('Demand / 1')) {
    return (v * 100).toFixed(2) + '%';
  }
  if (name.includes('Absorption') && Math.abs(v) > 100) return v.toLocaleString('en-US', {maximumFractionDigits:0}) + ' units';
  if (name.includes('Occupancy')) return (v * 100).toFixed(1) + '%';
  if (name.includes('Ages 20') || name.includes('Ages 25')) return (v * 100).toFixed(2) + '%';
  if (name.includes('Rent Control')) return v.toFixed(0) + '/5';
  return v.toFixed(4);
}

function showDetail(msa) {
  selectedMsa = msa;
  const d = MSA_DATA[msa];
  
  document.getElementById('dpMsaName').textContent = msa;
  document.getElementById('dpMeta').textContent = 
    `Inventory: ${d.inventory.toLocaleString()} units  |  Recovery Index: ${d.recovery_idx.toFixed(2)}  |  Months to Absorb: ${d.months_absorb.toFixed(1)}mo`;

  // Profile score boxes
  const profileHtml = ['Defensive','Growth','Recovery'].map(p => {
    const ps = d.profiles[p];
    const color = PROFILE_COLORS[p];
    return `<div class="dp-score-box">
      <div class="profile-name" style="color:${color}">${p}</div>
      <div class="score-val" style="color:${color}">${ps.final.toFixed(1)}</div>
      <div class="rank-val">Rank #${ps.rank}</div>
    </div>`;
  }).join('');
  document.getElementById('dpScores').innerHTML = profileHtml;

  // Indicators by category
  let bodyHtml = '';
  CAT_ORDER.forEach(cat => {
    const catInds = d.indicators.filter(i => i.cat === cat);
    if (!catInds.length) return;
    bodyHtml += `<div class="dp-section-title">${cat}</div>`;
    catInds.sort((a,b) => b.score - a.score).forEach(ind => {
      const color = getBarColor(ind.score);
      const rawStr = formatRaw(ind.raw, ind.name);
      const invNote = ind.invert ? ' <span style="color:#e53e3e;font-size:9px">↓inv</span>' : '';
      bodyHtml += `<div class="ind-row">
        <div class="ind-name">${ind.name}${invNote}</div>
        <div class="ind-bar-wrap">
          <div class="ind-bar-bg"><div class="ind-bar-fill" style="width:${ind.score}%;background:${color}"></div></div>
        </div>
        <div class="ind-score" style="color:${color}">${ind.score.toFixed(1)}</div>
        <div class="ind-raw">${rawStr}</div>
      </div>`;
    });
  });

  // Extra context
  bodyHtml += `<div class="dp-extra">
    <strong>Inventory Bonus:</strong> +${d.inv_bonus.toFixed(1)}pt (log-scale, max +8pt for Dallas)<br>
    <strong>Recovery Index:</strong> ${d.recovery_idx.toFixed(2)} ${d.recovery_idx < 0.5 ? '— severely depressed (Value-Add signal)' : d.recovery_idx > 1.3 ? '— above baseline (liquid market)' : '— near historical baseline'}<br>
    <strong>Months to Absorb:</strong> ${d.months_absorb.toFixed(1)} months ${d.months_absorb > 120 ? '— severe supply glut (full penalty)' : d.months_absorb > 60 ? '— elevated supply overhang' : d.months_absorb < 25 ? '— rapidly absorbing (bonus)' : '— moderate'}
  </div>`;

  document.getElementById('dpBody').innerHTML = bodyHtml;
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  buildTable(); // refresh to show selection highlight
}

function closeDetail() {
  selectedMsa = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  buildTable();
}
